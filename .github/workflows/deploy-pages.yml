name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - name: Inject Worker URL
        run: sed -i "s|https://textly-worker.YOUR-SUBDOMAIN.workers.dev|${{ secrets.WORKER_URL }}|g" frontend/index.html

      - name: Verify injection
        run: grep "WORKER_URL" frontend/index.html

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name=textly-agp
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
